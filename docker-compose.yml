# ════════════════════════════════════════════════════════════════
# Student Management System – Docker Compose (single container)
#
# One container serves everything:
#   http://localhost:3000/          → React frontend
#   http://localhost:3000/api/*     → Express REST API
#   http://localhost:3000/health    → Health check
#
# The Dockerfile build context is the repo root so it can copy
# from both backend/ and frontend/ in a multi-stage build.
# ════════════════════════════════════════════════════════════════

version: "3.9"

services:
  app:
    build:
      context: .                    # repo root – required for multi-stage copy
      dockerfile: backend/Dockerfile
    container_name: sms-app
    restart: unless-stopped
    environment:
      NODE_ENV:  production
      PORT:      3000
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    volumes:
      # Persist SQLite database between container restarts
      - sqlite_data:/app/database/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 30s

# ── Volumes ─────────────────────────────────────────────────────
volumes:
  sqlite_data:
    driver: local
  app_logs:
    driver: local
