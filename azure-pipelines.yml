# ════════════════════════════════════════════════════════════════
# Student Management System – Azure DevOps CI/CD Pipeline
# Single-container deployment (React frontend + Express backend)
#
# Final image serves:
#   /          → React SPA
#   /api/*     → Express REST API
#   /health    → Health check
#
# Pipeline Stages:
#   1. install      – Install backend & frontend dependencies
#   2. lint         – Lint frontend & backend code
#   3. build        – Build React app (Vite)
#   4. docker-build – Build single combined Docker image
#   5. push-acr     – Push image to Azure Container Registry
#   6. deploy       – Deploy container to Azure App Service
#   7. verify       – Verify deployment via /health endpoint
# ════════════════════════════════════════════════════════════════

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    exclude:
      - "*.md"
      - "docs/**"

pr:
  branches:
    include:
      - main

# ── Pipeline-level variables ──────────────────────────────────
variables:
  # Azure Container Registry name (without .azurecr.io)
  acrName: "smops2026"

  # Single combined image repository name
  imageRepository: "sms-app"

  # Service connections configured in Azure DevOps
  dockerRegistryServiceConnection: "azure-subscription-connection"
  azureSubscription: "azure-subscription-connection"

  # Azure App Service name
  webAppName: "smops-app-2026"

  # Full ACR hostname (derived)
  containerRegistry: "smops2026.azurecr.io"

  # Image tag – build number ensures traceability
  imageTag: "$(Build.BuildNumber)"

  # Node.js version
  nodeVersion: "20.x"

  # Working directories
  backendDir:  "$(System.DefaultWorkingDirectory)/backend"
  frontendDir: "$(System.DefaultWorkingDirectory)/frontend"

  # Root of the repo (Dockerfile lives here and references both dirs)
  rootDir: "$(System.DefaultWorkingDirectory)"

# ════════════════════════════════════════════════════════════════
# STAGE 1 – Install Dependencies
# ════════════════════════════════════════════════════════════════
stages:
  - stage: Install
    displayName: "Stage 1 – Install Dependencies"
    jobs:
      - job: InstallDependencies
        displayName: "Install Backend & Frontend Dependencies"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            displayName: "Use Node.js $(nodeVersion)"
            inputs:
              versionSpec: $(nodeVersion)

          - script: |
              echo "══════════════════════════════════════"
              echo "  Installing backend dependencies"
              echo "══════════════════════════════════════"
              npm ci
            workingDirectory: $(backendDir)
            displayName: "npm ci – Backend"

          - script: |
              echo "══════════════════════════════════════"
              echo "  Installing frontend dependencies"
              echo "══════════════════════════════════════"
              npm ci
            workingDirectory: $(frontendDir)
            displayName: "npm ci – Frontend"

          - task: Cache@2
            displayName: "Cache backend node_modules"
            inputs:
              key: 'npm | "$(Agent.OS)" | $(backendDir)/package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: "$(backendDir)/node_modules"

          - task: Cache@2
            displayName: "Cache frontend node_modules"
            inputs:
              key: 'npm | "$(Agent.OS)" | $(frontendDir)/package-lock.json'
              restoreKeys: 'npm | "$(Agent.OS)"'
              path: "$(frontendDir)/node_modules"

# ════════════════════════════════════════════════════════════════
# STAGE 2 – Lint
# ════════════════════════════════════════════════════════════════
  - stage: Lint
    displayName: "Stage 2 – Lint Code"
    dependsOn: Install
    jobs:
      - job: LintBackend
        displayName: "ESLint – Backend"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | $(backendDir)/package-lock.json'
              path: "$(backendDir)/node_modules"

          - script: npm run lint
            workingDirectory: $(backendDir)
            displayName: "Run ESLint on backend"

      - job: LintFrontend
        displayName: "ESLint – Frontend"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | $(frontendDir)/package-lock.json'
              path: "$(frontendDir)/node_modules"

          - script: npm run lint
            workingDirectory: $(frontendDir)
            displayName: "Run ESLint on frontend"

# ════════════════════════════════════════════════════════════════
# STAGE 3 – Build React Application
# ════════════════════════════════════════════════════════════════
  - stage: Build
    displayName: "Stage 3 – Build React Application"
    dependsOn: Lint
    jobs:
      - job: BuildFrontend
        displayName: "Vite Production Build"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(nodeVersion)

          - task: Cache@2
            inputs:
              key: 'npm | "$(Agent.OS)" | $(frontendDir)/package-lock.json'
              path: "$(frontendDir)/node_modules"

          - script: npm run build
            workingDirectory: $(frontendDir)
            displayName: "vite build"
            env:
              # Empty → API calls go to same origin as the page
              VITE_API_URL: ""

          - script: |
              echo "── Frontend build output ──────────────────────"
              du -sh $(frontendDir)/dist
              ls $(frontendDir)/dist
            displayName: "Inspect build output"

          # Publish dist/ as artifact (used for verification; Docker build
          # pulls it directly from the source tree via multi-stage Dockerfile)
          - task: PublishBuildArtifacts@1
            displayName: "Publish frontend dist artifact"
            inputs:
              pathToPublish: "$(frontendDir)/dist"
              artifactName:  "frontend-dist"
              publishLocation: Container

# ════════════════════════════════════════════════════════════════
# STAGE 4 – Build Single Docker Image
# ════════════════════════════════════════════════════════════════
  - stage: DockerBuild
    displayName: "Stage 4 – Build Docker Image"
    dependsOn: Build
    jobs:
      - job: BuildImage
        displayName: "Build Combined App Image"
        pool:
          vmImage: ubuntu-latest
        steps:
          # The Dockerfile lives in backend/ but its build context is the
          # repo root so it can COPY from both backend/ and frontend/
          - task: Docker@2
            displayName: "docker build – combined image"
            inputs:
              command:      build
              dockerfile:   "$(backendDir)/Dockerfile"
              buildContext: "$(rootDir)"
              repository:   "$(imageRepository)"
              tags: |
                $(imageTag)
                latest

          - script: |
              echo "Built image: $(imageRepository):$(imageTag)"
              docker images $(imageRepository)
            displayName: "Inspect built image"

# ════════════════════════════════════════════════════════════════
# STAGE 5 – Push to Azure Container Registry
# ════════════════════════════════════════════════════════════════
  - stage: PushACR
    displayName: "Stage 5 – Push to Azure Container Registry"
    dependsOn: DockerBuild
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: PushImage
        displayName: "Push Combined Image to ACR"
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: "Build & Push to ACR"
            inputs:
              command:           buildAndPush
              dockerfile:        "$(backendDir)/Dockerfile"
              buildContext:      "$(rootDir)"
              containerRegistry: $(dockerRegistryServiceConnection)
              repository:        "$(imageRepository)"
              tags: |
                $(imageTag)
                latest

          - script: |
              echo "✅ Pushed to ACR"
              echo "   Image: $(containerRegistry)/$(imageRepository):$(imageTag)"
              echo "   Also tagged: $(containerRegistry)/$(imageRepository):latest"
            displayName: "Log pushed image URI"

# ════════════════════════════════════════════════════════════════
# STAGE 6 – Deploy to Azure App Service
# ════════════════════════════════════════════════════════════════
  - stage: Deploy
    displayName: "Stage 6 – Deploy to Azure App Service"
    dependsOn: PushACR
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployToAppService
        displayName: "Deploy Combined Container"
        pool:
          vmImage: ubuntu-latest
        environment: "production"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: "Deploy container to App Service"
                  inputs:
                    azureSubscription: $(azureSubscription)
                    appName:           $(webAppName)
                    containers:        "$(containerRegistry)/$(imageRepository):$(imageTag)"
                    appSettings: >
                      -NODE_ENV production
                      -PORT 3000
                      -LOG_LEVEL info
                      -WEBSITES_PORT 3000

                - script: |
                    echo "🚀 Deployed: $(containerRegistry)/$(imageRepository):$(imageTag)"
                    echo "   URL: https://$(webAppName).azurewebsites.net"
                  displayName: "Log deployment info"

# ════════════════════════════════════════════════════════════════
# STAGE 7 – Deployment Verification
# ════════════════════════════════════════════════════════════════
  - stage: Verify
    displayName: "Stage 7 – Deployment Verification"
    dependsOn: Deploy
    condition: succeeded()
    jobs:
      - job: HealthCheck
        displayName: "Verify /health endpoint"
        pool:
          vmImage: ubuntu-latest
        steps:
          - script: |
              chmod +x $(System.DefaultWorkingDirectory)/scripts/verify-deployment.sh
              $(System.DefaultWorkingDirectory)/scripts/verify-deployment.sh \
                "https://$(webAppName).azurewebsites.net/health"
            displayName: "Poll /health until UP"
            env:
              WEB_APP_NAME: $(webAppName)

          - script: |
              echo ""
              echo "═══════════════════════════════════════════════════"
              echo "  ✅  DEPLOYMENT SUCCESSFUL"
              echo "═══════════════════════════════════════════════════"
              echo "  Frontend : https://$(webAppName).azurewebsites.net"
              echo "  API      : https://$(webAppName).azurewebsites.net/api/students"
              echo "  Health   : https://$(webAppName).azurewebsites.net/health"
              echo "  Build    : $(Build.BuildNumber)"
              echo "  Image    : $(containerRegistry)/$(imageRepository):$(imageTag)"
              echo "═══════════════════════════════════════════════════"
            displayName: "Deployment summary"
