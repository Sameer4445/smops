# Nginx configuration for React SPA + reverse proxy to backend

server {
    listen       5173;
    server_name  _;

    # Serve React app
    root  /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets aggressively (hashed filenames from Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # Health check endpoint (static HTML for Docker HEALTHCHECK)
    location = /health.html {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Proxy API calls to the backend service
    location /api/ {
        proxy_pass         http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade         $http_upgrade;
        proxy_set_header   Connection      "upgrade";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy health check to backend
    location /health {
        proxy_pass http://backend:3000/health;
    }

    # SPA fallback – all unknown routes served as index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
